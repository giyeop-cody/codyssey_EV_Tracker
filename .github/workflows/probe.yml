name: Probe Endpoints (manual)

# 번들에서 발굴한 API 후보 실험용 — 수동 실행 전용.
# 출력은 마스킹된 구조 정보만 포함합니다. 확인 후 이 파일은 삭제합니다.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: 세션 시크릿 확인
        id: check
        env:
          CODYSSEY_SESSION: ${{ secrets.CODYSSEY_SESSION }}
        run: |
          if [ -z "$CODYSSEY_SESSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::CODYSSEY_SESSION 미등록 — 프로브 건너뜀."
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.skip != 'true'

      - uses: actions/setup-node@v4
        if: steps.check.outputs.skip != 'true'
        with:
          node-version: 20

      - name: Run probe
        if: steps.check.outputs.skip != 'true'
        env:
          CODYSSEY_SESSION: ${{ secrets.CODYSSEY_SESSION }}
        run: node probe_endpoints.js
